# ── Production Profile ──────────────────────────────────────────────
# Activate with: java -jar backend.jar --spring.profiles.active=prod
# or via env: SPRING_PROFILES_ACTIVE=prod

# ── Database (SSL required) ──
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── HTTPS enforcement ──
server.ssl.enabled=false
# Set to true and configure keystore when terminating TLS at the app layer.
# If TLS is terminated at a reverse proxy (Nginx, AWS ALB), leave false.
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12

# ── Security flag ──
app.security.require-https=true

# ── CORS (set your production domain) ──
app.cors.allowed-origins=https://yourdomain.com

# ── Logging ──
logging.level.com.islamic.ai.security=INFO
logging.level.org.springframework.security=WARN

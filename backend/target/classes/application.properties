# Supabase PostgreSQL connection
spring.datasource.url=${DB_URL}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (Hikari)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server
server.port=8082

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# NVIDIA AI API Configuration
app.ai.api-key=${API_KEY}
app.ai.base-url=https://integrate.api.nvidia.com/v1/chat/completions
app.ai.model=meta/llama-3.1-405b-instruct
app.ai.standard-max-tokens=4096
app.ai.premium-max-tokens=8192

# PayPal Subscription Configuration
# For LOCAL TESTING: use sandbox credentials
# For PRODUCTION: switch to live credentials + api-m.paypal.com
app.paypal.client-id=${PAYPAL_CLIENT_ID}
app.paypal.secret=${PAYPAL_SECRET}
app.paypal.base-url=https://api-m.sandbox.paypal.com

# CORS (comma-separated origins; override in application-prod.properties)
app.cors.allowed-origins=http://localhost:5173

# HTTPS enforcement (set to true in prod profile)
app.security.require-https=false

# Rate Limiting (per-IP, token-bucket)
app.rate-limit.login.capacity=3
app.rate-limit.login.minutes=15
app.rate-limit.signup.capacity=3
app.rate-limit.signup.minutes=60
app.rate-limit.generate.capacity=10
app.rate-limit.generate.minutes=60
app.rate-limit.general.capacity=60
app.rate-limit.general.minutes=1

# Security Audit Logging
logging.level.com.islamic.ai.security=INFO
logging.level.SECURITY_AUDIT=INFO

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.report.recipient=muslimforever833@gmail.com

# Rate Limiting — Report
app.rate-limit.report.capacity=5
app.rate-limit.report.minutes=60

# Rate Limiting — Forgot Password
app.rate-limit.forgot-password.capacity=3
app.rate-limit.forgot-password.minutes=60

# Frontend URL (used for password reset email links)
app.frontend.url=http://localhost:5173

# ── Production Profile ──────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod (set in Render env vars)

# ── Server port (Render injects PORT env var) ──
server.port=${PORT:8082}

# ── Database (SSL required for Supabase) ──
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA: validate only in prod, never auto-update ──
spring.jpa.hibernate.ddl-auto=validate

# ── HTTPS enforcement ──
server.ssl.enabled=false
# TLS is terminated at Render's reverse proxy, not the app layer
app.security.require-https=true

# ── CORS (your Vercel frontend URL) ──
app.cors.allowed-origins=${APP_CORS_ORIGINS:https://content-script-generator-lime.vercel.app}

# ── Frontend URL (for password reset email links) ──
app.frontend.url=${APP_FRONTEND_URL:https://content-script-generator-lime.vercel.app}

# ── PayPal (keep sandbox until you apply for live) ──
app.paypal.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}

# ── Logging ──
logging.level.com.islamic.ai.security=INFO
logging.level.org.springframework.security=WARN
